repo_path: /home/jinwang/workspace/hermes-safe-restart-bundle
install_script: /home/jinwang/workspace/hermes-safe-restart-bundle/scripts/install.sh
verify_script: /home/jinwang/workspace/hermes-safe-restart-bundle/scripts/verify.sh
apply_order: 30
target: ops-skill
compatibility:
  strategy: external-ops-workflow
